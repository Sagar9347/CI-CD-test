name: CI/CD-Staging
on:
 push:
   branches:
     - main
 pull_request:
   types:
    - opened
    - synchronize
jobs:
  build:
   runs-on: ubuntu-slim
   if: github.event_name == 'push' && github.ref_name == 'main'
   steps:
     - name: build step
       run: echo "Running on main"
  deploy:
   runs-on: ubuntu-slim
   if: github.event_name == 'pull_request'
   steps:
     - name: deploy step
       run: echo "Running on Staging"
      
