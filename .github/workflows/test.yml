name: CI/CD
on:
 workflow_dispatch:
   inputs:
     environment:
      required: true
      type: choice
      options:
        - dev
        - staging
        - prod
 
jobs:
 build:
  env:
   MY_NAME: "Sagar"
  runs-on: ubuntu-slim
  steps:
